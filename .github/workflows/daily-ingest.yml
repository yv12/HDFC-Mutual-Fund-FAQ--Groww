name: Daily Knowledge Base Sync

on:
  schedule:
    # Runs at 04:30 UTC every day, which is 10:00 AM IST
    - cron: '30 4 * * *'
  workflow_dispatch: # Allows you to run it manually from the GitHub UI!

jobs:
  scrape_and_sync:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        working-directory: ./backend
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install chromium

      - name: Run Web Scraper and Sync to Qdrant Cloud
        working-directory: ./backend
        env:
          # We force the cloud database configuration
          VECTOR_DB_PROVIDER: qdrant
          EMBEDDING_PROVIDER: api
          
          # We inject your secrets securely
          QDRANT_URL: ${{ secrets.QDRANT_URL }}
          QDRANT_API_KEY: ${{ secrets.QDRANT_API_KEY }}
          HF_API_TOKEN: ${{ secrets.HF_API_TOKEN }}
          
        run: |
          python -m scripts.ingest
