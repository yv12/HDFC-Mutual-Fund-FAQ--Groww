# backend/nixpacks.toml
# Railway build configuration for Playwright browser dependencies

[phases.setup]
aptPkgs = [
    "libnss3",
    "libatk1.0-0",
    "libatk-bridge2.0-0",
    "libcups2",
    "libdrm2",
    "libxkbcommon0",
    "libxcomposite1",
    "libxdamage1",
    "libxrandr2",
    "libgbm1",
    "libpango-1.0-0",
    "libcairo2",
    "libasound2",
    "libxshmfence1"
]

[phases.install]
cmds = [
    "pip install -r requirements.txt",
    "playwright install chromium",
    "python -c \"from sentence_transformers import SentenceTransformer; SentenceTransformer('BAAI/bge-small-en-v1.5')\""
]

[variables]
ANONYMIZED_TELEMETRY = "false"
